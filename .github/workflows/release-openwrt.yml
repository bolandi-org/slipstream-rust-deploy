name: Build for OpenWrt

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # فعال‌سازی دکمه Run workflow در تب Actions

jobs:
  build-openwrt:
    name: Build for OpenWrt (ARM64 Musl)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive # اگر پروژه ساب‌ماژول دارد، حتماً دانلود شوند

      - name: List files for debugging
        run: ls -R # برای اطمینان از وجود Cargo.toml در ریشه

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl

      - name: Install Cross
        run: |
          # نصب مستقیم نسخه باینری برای سرعت و اطمینان بیشتر
          curl -L https://github.com/cross-rs/cross/releases/latest/download/cross-x86_64-unknown-linux-musl.tar.gz | tar xz -C /usr/local/bin
          curl -L https://github.com/cross-rs/cross/releases/latest/download/cross-util-x86_64-unknown-linux-musl.tar.gz | tar xz -C /usr/local/bin

      - name: Build Binary with Cross
        env:
          CROSS_CONTAINER_ENGINE: docker
        run: |
          # اجرای بیلد با استفاده از کراس
          cross build --target aarch64-unknown-linux-musl --release

      - name: Archive Binary
        run: |
          # پیدا کردن فایل اجرایی و فشرده‌سازی
          # نام فایل اجرایی را بر اساس نام پروژه در Cargo.toml جایگزین کن اگر متفاوت است
          cd target/aarch64-unknown-linux-musl/release/
          BINARY_NAME=$(ls -F | grep -v / | head -n 1 | tr -d '*')
          tar -czf ../../../slipstream-openwrt-aarch64.tar.gz "$BINARY_NAME"
          cd ../../../

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: slipstream-openwrt-aarch64
          path: slipstream-openwrt-aarch64.tar.gz

      - name: Release (Only on Tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: slipstream-openwrt-aarch64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
