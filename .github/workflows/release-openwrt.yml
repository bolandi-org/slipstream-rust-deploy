name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # این خط باعث ظهور دکمه آبی Run workflow می‌شود

jobs:
  build-openwrt:
    name: Build for OpenWrt (ARM64 Musl)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl

      - name: Install Cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build Binary
        run: cross build --target aarch64-unknown-linux-musl --release

      - name: Archive Binary
        run: |
          cd target/aarch64-unknown-linux-musl/release/
          tar -czf ../../../slipstream-openwrt-aarch64.tar.gz slipstream-client
          cd ../../../

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: slipstream-openwrt-aarch64
          path: slipstream-openwrt-aarch64.tar.gz

      - name: Release (Only on Tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: slipstream-openwrt-aarch64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
