name: Build for OpenWrt

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # فعال‌سازی دکمه Run workflow در تب Actions

jobs:
  build-openwrt:
    name: Build for OpenWrt (ARM64 Musl)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: List files for debugging
        run: |
          pwd
          ls -F

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl

      - name: Install Cross
        run: |
          # پیدا کردن آخرین نسخه و نصب فقط فایل اصلی cross
          LATEST_TAG=$(curl -s https://api.github.com/repos/cross-rs/cross/releases/latest | grep -oP '"tag_name": "\K[^"]+')
          echo "Installing Cross version $LATEST_TAG"
          curl -L "https://github.com/cross-rs/cross/releases/download/${LATEST_TAG}/cross-x86_64-unknown-linux-musl.tar.gz" | tar xz -C /usr/local/bin

      - name: Build Binary with Cross
        env:
          CROSS_CONTAINER_ENGINE: docker
        run: |
          # اطمینان از اینکه در ریشه پروژه هستیم و اجرای بیلد
          if [ -f "Cargo.toml" ]; then
            cross build --target aarch64-unknown-linux-musl --release
          else
            echo "Error: Cargo.toml not found in root directory!"
            exit 1
          fi

      - name: Archive Binary
        run: |
          # استخراج هوشمند فایل باینری
          OUTPUT_DIR="target/aarch64-unknown-linux-musl/release"
          if [ -d "$OUTPUT_DIR" ]; then
            cd "$OUTPUT_DIR"
            # پیدا کردن فایل اجرایی (فایلی که دایرکتوری نیست و دسترسی اجرا دارد)
            BINARY_NAME=$(find . -maxdepth 1 -type f -executable | head -n 1 | sed 's|^\./||')
            if [ -n "$BINARY_NAME" ]; then
              tar -czf ../../../slipstream-openwrt-aarch64.tar.gz "$BINARY_NAME"
              echo "Archived $BINARY_NAME"
            else
              echo "Error: No binary found in $OUTPUT_DIR"
              exit 1
            fi
            cd ../../../
          else
            echo "Error: Output directory $OUTPUT_DIR not found"
            exit 1
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: slipstream-openwrt-aarch64
          path: slipstream-openwrt-aarch64.tar.gz

      - name: Release (Only on Tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: slipstream-openwrt-aarch64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
