name: Build for OpenWrt

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # فعال‌سازی دکمه Run workflow در تب Actions

jobs:
  build-openwrt:
    name: Build for OpenWrt (ARM64 Musl)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: List files for debugging
        run: |
          echo "Current Path: $(pwd)"
          ls -R

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl

      - name: Install Cross
        run: |
          # پیدا کردن آخرین نسخه و نصب فقط فایل اصلی cross
          LATEST_TAG=$(curl -s https://api.github.com/repos/cross-rs/cross/releases/latest | grep -oP '"tag_name": "\K[^"]+')
          echo "Installing Cross version $LATEST_TAG"
          curl -L "https://github.com/cross-rs/cross/releases/download/${LATEST_TAG}/cross-x86_64-unknown-linux-musl.tar.gz" | tar xz -C /usr/local/bin

      - name: Build Binary with Cross
        env:
          CROSS_CONTAINER_ENGINE: docker
        run: |
          # پیدا کردن خودکار مسیر Cargo.toml در صورتی که در ریشه نباشد
          PROJECT_ROOT=$(find . -name "Cargo.toml" -exec dirname {} \; | head -n 1)
          if [ -z "$PROJECT_ROOT" ]; then
            echo "Error: Cargo.toml not found anywhere in the repository!"
            exit 1
          fi
          
          echo "Found Cargo.toml in $PROJECT_ROOT. Switching to directory..."
          cd "$PROJECT_ROOT"
          
          # اجرای بیلد دقیقاً مشابه ساختار داکرفایل قبلی
          cross build --target aarch64-unknown-linux-musl --release

      - name: Archive Binary
        run: |
          # پیدا کردن فایل باینری در پوشه هدف (معمولاً نام پروژه در Cargo.toml است)
          # ما به دنبال فایل اجرایی در مسیر release هستیم
          OUTPUT_PATH=$(find target/aarch64-unknown-linux-musl/release/ -maxdepth 1 -type f -executable | head -n 1)
          
          if [ -n "$OUTPUT_PATH" ]; then
            BINARY_NAME=$(basename "$OUTPUT_PATH")
            echo "Found binary: $BINARY_NAME at $OUTPUT_PATH"
            cp "$OUTPUT_PATH" ./slipstream-client-openwrt
            tar -czf slipstream-openwrt-aarch64.tar.gz slipstream-client-openwrt
          else
            echo "Error: Binary not found in target directory!"
            # نمایش محتویات برای دیباگ در صورت شکست
            ls -R target/
            exit 1
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: slipstream-openwrt-aarch64
          path: slipstream-openwrt-aarch64.tar.gz

      - name: Release (Only on Tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: slipstream-openwrt-aarch64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
